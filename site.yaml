- name: Deploy Flask app on backend webservers (online mode)
  hosts: webservers
  become: true
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    app_root: /opt/NSO_A2
    connectivity_test_host: google.com
    connectivity_test_port: 443
  tasks:
   
    - name: Detect package manager and collect installed packages
      ansible.builtin.package_facts:
        manager: apt

    - name: Install git
      ansible.builtin.apt:
        name: git
        state: present
        update_cache: true
      when: "'git' not in ansible_facts.packages"

    - name: Install python3
      ansible.builtin.apt:
        name: python3
        state: present
      when: "'python3' not in ansible_facts.packages"

    - name: Install Flask
      ansible.builtin.apt:
        name: python3-flask
        state: present
      when: "'python3-flask' not in ansible_facts.packages"
    - name: Ensure application directory exists
      ansible.builtin.file:
        path: "{{ app_root }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"

    - name: Clone or update NSO_A2 repository
      ansible.builtin.git:
        repo: https://github.com/patrikarlos/NSO_A2.git
        dest: "{{ app_root }}"
        version: main
        update: true
      become_user: "{{ ansible_user }}"

    - name: Create systemd service for Flask app
      ansible.builtin.copy:
        dest: /etc/systemd/system/nso-flask.service
        mode: "0644"
        content: |
          [Unit]
          Description=NSO A2 Flask application
          After=network.target

          [Service]
          User={{ ansible_user }}
          Group={{ ansible_user }}
          WorkingDirectory=/opt/NSO_A2
          Environment=FLASK_APP=/opt/NSO_A2/application2.py
          ExecStart={{ ansible_python_interpreter }} -m flask run --host=0.0.0.0 --port=5000
          Restart=always
          RestartSec=2

          [Install]
          WantedBy=multi-user.target
 
    - name: Start nso flask service
      ansible.builtin.systemd:
        name: nso-flask.service
        enabled: true
        state: started

    - name: Check service status
      ansible.builtin.command: systemctl status nso-flask.service --no-pager -l
      register: nso_status
      changed_when: false
      failed_when: false

    - name: Show service status
      ansible.builtin.debug:
        var: nso_status

- name: Deploy and configure HAProxy (online mode)
  hosts: HAproxy
  become: true
  vars:
    connectivity_test_host: google.com
    connectivity_test_port: 443
  tasks:
  
    - name: Verify outbound network connectivity from HAProxy host
      ansible.builtin.wait_for:
        host: "{{ connectivity_test_host }}"
        port: "{{ connectivity_test_port }}"
        timeout: 6
      register: haproxy_connectivity_test
      changed_when: false

    - name: Fail if HAProxy host has no outbound network access
      ansible.builtin.assert:
        that:
          - haproxy_connectivity_test is succeeded
        fail_msg: "HAProxy host has no outbound network connectivity; online apt installation cannot continue."

    - name: Detect package manager and collect installed packages
      ansible.builtin.package_facts:
        manager: apt

    - name: Install HAProxy (if not already installed)
      ansible.builtin.apt:
        name: haproxy
        state: present
        update_cache: true
      when: "'haproxy' not in ansible_facts.packages"

    - name: Configure HAProxy for webservers
      ansible.builtin.copy:
        dest: /etc/haproxy/haproxy.cfg
        mode: "0644"
        content: |
          global
              log /dev/log local0
              log /dev/log local1 notice
              chroot /var/lib/haproxy
              stats socket /run/haproxy/admin.sock mode 660 level admin expose-fd listeners
              stats timeout 30s
              user haproxy
              group haproxy
              daemon

          defaults
              log global
              mode http
              option httplog
              option dontlognull
              timeout connect 5s
              timeout client  30s
              timeout server  30s

          frontend http_front
              bind *:80
              default_backend flask_backends

          backend flask_backends
              balance roundrobin
              option httpchk GET /
          {% for host in groups['webservers'] %}
              server {{ host }} {{ hostvars[host].ansible_default_ipv4.address | default(hostvars[host].ansible_host | default(host)) }}:5000 check
          {% endfor %}
    
    - name: start HAProxy
      ansible.builtin.systemd:
        name: haproxy
        enabled: true
        state: restarted